# RL auto-tuning experiment configuration
experiment:
  name: rl_auto_tune

env:
  num_eval_trials: 5
  target_range_deg: 120.0
  max_aim_time: 0.6
  hit_threshold_deg: 1.0
  max_episode_steps: 50
  action_scale: 0.05

rl:
  algorithm: PPO           # PPO or SAC
  total_timesteps: 50000
  n_steps: 512             # PPO rollout length
  batch_size: 64
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  policy: MlpPolicy
  policy_kwargs:
    net_arch: [128, 128]

logging:
  tensorboard_dir: runs/rl_auto_tune/tb
  save_dir: runs/rl_auto_tune
  log_interval: 10
  eval_freq: 2000
  eval_episodes: 20

output:
  model_path: runs/rl_auto_tune/ppo_aimenv
  params_json: runs/rl_auto_tune/learned_params.json
