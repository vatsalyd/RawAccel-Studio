# Ideal curve learning experiment configuration
experiment:
  name: ideal_curve

data:
  num_profiles: 5000
  input_dim: 8               # number of player/session features
  num_params: 5
  val_fraction: 0.2
  seed: 123

model:
  input_dim: 8
  hidden_dim: 128
  num_params: 5
  dropout: 0.1
  use_batch_norm: true

training:
  epochs: 40
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  lr_patience: 5
  lr_factor: 0.5

evaluation:
  sim_eval: true              # run predicted params in simulator
  sim_trials: 20

logging:
  tensorboard_dir: runs/ideal_curve/tb
  save_dir: runs/ideal_curve

output:
  model_path: runs/ideal_curve/ideal_curve_net.pt
