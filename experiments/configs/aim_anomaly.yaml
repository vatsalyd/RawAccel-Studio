# Anomaly / assisted-aim detection experiment configuration
experiment:
  name: aim_anomaly

data:
  n_per_class: 500
  steps: 60
  val_fraction: 0.2
  seed: 99
  assisted_patterns:          # types of assisted aim to simulate
    - snap                    # instant snap to target
    - smooth                  # smooth aimbot (low-noise, high-gain)
    - trigger                 # trigger bot (normal aim, instant fire on crosshair)

model:
  input_dim: 4                # [mouse_dx, dt, view_delta, error]
  hidden_dim: 128
  num_layers: 1
  dropout: 0.2
  use_cnn: true               # 1D CNN feature extractor before LSTM
  cnn_channels: 64
  cnn_kernel: 5

training:
  epochs: 25
  batch_size: 32
  max_seq_len: 80
  learning_rate: 0.001
  weight_decay: 0.0001

logging:
  tensorboard_dir: runs/aim_anomaly/tb
  save_dir: runs/aim_anomaly

output:
  model_path: runs/aim_anomaly/aim_anomaly_net.pt
